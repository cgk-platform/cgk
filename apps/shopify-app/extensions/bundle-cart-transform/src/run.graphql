query Input {
  cart {
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
          currencyCode
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
        }
      }
      bundleId: attribute(key: "_bundle_id") {
        value
      }
      bundleName: attribute(key: "_bundle_name") {
        value
      }
      bundleDiscount: attribute(key: "_bundle_discount") {
        value
      }
      bundleDiscountType: attribute(key: "_bundle_discount_type") {
        value
      }
      isFreeGift: attribute(key: "_bundle_free_gift") {
        value
      }
    }
  }
}
