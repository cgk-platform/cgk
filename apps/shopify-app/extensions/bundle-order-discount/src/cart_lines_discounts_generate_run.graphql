query Input {
  cart {
    lines {
      id
      quantity
      cost {
        subtotalAmount {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
        }
      }
      bundleId: attribute(key: "_bundle_id") {
        value
      }
      isFreeGift: attribute(key: "_bundle_free_gift") {
        value
      }
      giftMinItems: attribute(key: "_bundle_gift_min_items") {
        value
      }
    }
  }
  discount {
    metafield(namespace: "$app:bundle-discount", key: "config") {
      jsonValue
    }
  }
}
