# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "6bdb14a850b3220eaa2c8decb420bb8c"
name = "CGK Platform"
application_url = "https://shopify.dev/apps/default-app-home"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true
dev_store_url = "cgk-unlimited.myshopify.com"

# Webhooks use 2026-04 for latest features. Extensions use 2026-01 (their own
# api_version in each extension's shopify.extension.toml). This is intentional —
# extensions pin to the API version they were built/tested against and are bumped
# independently on each deployment cycle.
[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
scopes = "write_pixels,read_customer_events,read_orders,write_orders,read_customers,write_customers,read_draft_orders,write_draft_orders,read_products,write_products,read_discounts,write_discounts,read_price_rules,write_price_rules,read_inventory,write_inventory,read_fulfillments,write_fulfillments,read_shipping,write_shipping,read_gift_cards,write_gift_cards,read_content,write_content,read_themes,read_locales,read_markets,read_reports,read_analytics,read_checkouts,write_checkouts,read_product_listings,read_publications,read_locations,read_merchant_managed_fulfillment_orders,write_merchant_managed_fulfillment_orders,read_third_party_fulfillment_orders,write_third_party_fulfillment_orders,read_assigned_fulfillment_orders,write_assigned_fulfillment_orders,read_files,write_files,read_delivery_customizations,write_delivery_customizations,read_cart_transforms,write_cart_transforms"

[auth]
redirect_urls = [ "https://shopify.dev/apps/default-app-home/api/auth" ]

[pos]
embedded = false
