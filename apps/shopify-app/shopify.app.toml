# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "6b75b94700f2422d53d5f4f920d76e45"
name = "CGK Platform"
application_url = "https://shopify.dev/apps/default-app-home"
embedded = true

[build]
automatically_update_urls_on_dev = true
dev_store_url = "meliusly.myshopify.com"

# Webhooks use 2026-04 for latest features. Extensions use 2026-01 (their own
# api_version in each extension's shopify.extension.toml). This is intentional —
# extensions pin to the API version they were built/tested against and are bumped
# independently on each deployment cycle.
[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "orders/create" ]
  uri = "/webhooks/orders/create"

  [[webhooks.subscriptions]]
  topics = [ "orders/updated" ]
  uri = "/webhooks/orders/updated"

[access_scopes]
# Admin API scopes for backend operations
# Note: write_* permissions automatically include read_* permissions
scopes = "write_pixels,read_customer_events,write_orders,read_all_orders,write_customers,write_draft_orders,write_products,write_discounts,write_price_rules,write_inventory,write_fulfillments,write_shipping,write_gift_cards,write_content,read_themes,read_locales,read_markets,read_reports,read_analytics,write_checkouts,read_product_listings,read_publications,read_locations,write_merchant_managed_fulfillment_orders,write_third_party_fulfillment_orders,write_assigned_fulfillment_orders,write_files,write_delivery_customizations,write_cart_transforms,write_custom_fulfillment_services,write_marketing_events,write_resource_feedbacks,write_script_tags,write_translations,write_payment_gateways,write_payment_terms"

# Storefront API scopes for headless storefront (public access)
use_legacy_install_flow = false

[auth]
redirect_urls = [
  "https://cgk-admin.vercel.app/api/admin/shopify-app/callback",
  "https://cgk-orchestrator-cgk-linens-88e79683.vercel.app/api/admin/shopify-app/callback",
  "http://localhost:3200/api/admin/shopify-app/callback",
  "http://localhost:3100/api/admin/shopify-app/callback"
]

[pos]
embedded = false
